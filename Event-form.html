<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event</title>
    <link rel="stylesheet" href="Event.css">
</head>

<body>

<header>

    <h1>Event Management System</h1>

    <nav>
        <a href="Dashboard.html">🏠 Dashboard</a>
        <a href="EventList.html">📅 Events</a>
        <a href="Attendee.html">👥 Attendees</a>
        <a href="Registration.html">📝 Registration</a>
        <a href="index.html">🚪 Logout</a>
    </nav>

</header>

<div class="container">

    <h2 class="page-title">Add New Event</h2>

    <div class="card">

        <form action="#" method="post">

            <div class="form-group">
                <label>Event Name</label>
                <input type="text" placeholder="Enter event name" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea placeholder="Enter event description" rows="5" required></textarea>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" required>
            </div>

            <div class="form-group">
                <label>Time</label>
                <input type="time" required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" placeholder="Enter event location" required>
            </div>

            <div class="form-group">
                <label>Maximum Attendees</label>
                <input type="number" placeholder="Enter maximum attendees" min="1" required>
            </div>

            <div class="form-group">
                <label>Event Category</label>

                <select required>
                    <option value="">Select Category</option>
                    <option>Conference</option>
                    <option>Workshop</option>
                    <option>Seminar</option>
                    <option>Competition</option>
                    <option>Festival</option>
                    <option>Sports</option>
                </select>
            </div>

            <button type="submit" class="register-btn">
                Save Event
            </button>

        </form>

    </div>

</div>

<footer>
    © 2026 Event Management System
</footer>

</body>
</html>
